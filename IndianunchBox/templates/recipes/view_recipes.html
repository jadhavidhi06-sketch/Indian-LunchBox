{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4 text-center" style="font-family: 'Playfair Display', serif; color:#c94c4c;">Discover Recipes 🍱</h2>

    <div class="recipe-grid">
        {% for r in recipes %}
        <div class="recipe-card shadow-sm">
            <img src="/media/{{ r.3 }}" class="recipe-img">
            <div class="recipe-info">
                <h5 class="recipe-title">{{ r.1 }}</h5>
                <p class="recipe-desc">{{ r.2|truncatechars:120 }}</p>
                <p class="text-muted small">By {{ r.4 }}</p>
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <a href="/recipe/{{ r.0 }}/" class="btn btn-auth btn-sm">View</a>
                    <button class="btn btn-outline-danger btn-sm">❤️ Like</button>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-center">No recipes yet. Be the first to <a href="/add-recipe/">add one!</a></p>
        {% endfor %}
    </div>
</div>

<style>
.recipe-grid {
    column-count: 3;
    column-gap: 1rem;
}

@media(max-width: 992px) {
    .recipe-grid { column-count: 2; }
}

@media(max-width: 576px) {
    .recipe-grid { column-count: 1; }
}

.recipe-card {
    display: inline-block;
    background: #fff8f0;
    margin-bottom: 1rem;
    width: 100%;
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.2s;
    break-inside: avoid;
}

.recipe-card:hover { transform: scale(1.03); }

.recipe-img {
    width: 100%;
    object-fit: cover;
    max-height: 250px;
}

.recipe-info {
    padding: 0.8rem 1rem;
}

.recipe-title {
    font-weight: 600;
    color: #c94c4c;
}

.recipe-desc {
    font-size: 14px;
    color: #555;
    margin-bottom: 5px;
}
</style>
{% endblock %}
