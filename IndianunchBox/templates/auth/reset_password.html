{% extends 'base.html' %}

{% block content %}
<div class="reset-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="nostalgic-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="reset-icon mb-3">
                            <i class="fas fa-lock fa-3x" style="color: #e2b13b;"></i>
                        </div>
                        <h2 style="font-family: 'Playfair Display', serif; color: #5a3e2e;">
                            Create New Password 🔒
                        </h2>
                        <p class="text-muted">Choose a strong password for your account</p>
                        <div class="divider-nostalgic"></div>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} mb-3">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label class="form-label fw-semibold">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text reset-input-icon">
                                    <i class="fas fa-key"></i>
                                </span>
                                <input type="password" name="password" class="form-control reset-input" 
                                       placeholder="Enter new password" required>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text reset-input-icon">
                                    <i class="fas fa-check-circle"></i>
                                </span>
                                <input type="password" name="confirm_password" class="form-control reset-input" 
                                       placeholder="Confirm new password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-cozy w-100 py-2">
                            <i class="fas fa-save me-2"></i> Reset Password
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/login/" class="back-link">
                            <i class="fas fa-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .reset-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background: linear-gradient(135deg, #fff9ef 0%, #fff2e2 100%);
    }
    
    .reset-input {
        border: 1px solid #f0dfbf;
        border-radius: 12px;
        padding: 12px 15px;
    }
    
    .reset-input:focus {
        border-color: #e2b13b;
        box-shadow: 0 0 0 4px rgba(226, 177, 59, 0.1);
        outline: none;
    }
    
    .reset-input-icon {
        background: #fff5ea;
        border: 1px solid #f0dfbf;
        border-right: none;
        border-radius: 12px 0 0 12px;
        color: #c96b4a;
    }
    
    .back-link {
        color: #c96b4a;
        text-decoration: none;
    }
    
    .back-link:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}
